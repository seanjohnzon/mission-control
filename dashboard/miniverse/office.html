<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Control — Office</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f1119;
    color: #eee;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 12px;
  }
  #miniverse-container {
    border: 2px solid #2a2d3d;
    border-radius: 6px;
    overflow: hidden;
    background: #0f0f23;
    display: inline-block;
    line-height: 0;
  }
  #tooltip {
    position: fixed;
    background: rgba(15,17,25,0.95);
    border: 1px solid #58a6ff;
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 11px;
    pointer-events: none;
    display: none;
    z-index: 100;
    max-width: 220px;
    font-family: system-ui, -apple-system, sans-serif;
  }
  #tooltip .name { color: #58a6ff; font-weight: bold; font-size: 12px; }
  #tooltip .state { color: #8b949e; margin-top: 2px; }
  #tooltip .task { color: #3fb950; margin-top: 2px; }
  .status-bar {
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: #8b949e;
    font-family: system-ui, -apple-system, sans-serif;
  }
  .status-bar .agent { display: flex; align-items: center; gap: 5px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #555; }
  .status-dot.working { background: #3fb950; }
  .status-dot.idle { background: #d29922; }
  .status-dot.sleeping { background: #818cf8; }
  .status-dot.thinking { background: #ec4899; }
  .status-dot.error { background: #f85149; }
  .status-dot.speaking { background: #2dd4bf; }
  .status-dot.offline { background: #484f58; }
</style>
</head>
<body>
  <div id="miniverse-container"></div>
  <div class="status-bar" id="status-bar"></div>
  <div id="tooltip">
    <div class="name"></div>
    <div class="state"></div>
    <div class="task"></div>
  </div>

  <script src="vendor/miniverse.iife.js"></script>
  <script>
    // --- MC Adapter: feeds Mission Control agent data into Miniverse ---
    const MV = window.Miniverse;
    const WORLD_ID = 'cozy-startup';
    const basePath = `worlds/${WORLD_ID}`;

    // Agent definitions: maps MC agents to Miniverse citizens
    const MC_AGENTS = [
      { agentId: 'bridge', name: 'Bridge', sprite: 'morty',  machine: 'Mac Mini M4', roles: ['Conductor', 'Broker'] },
      { agentId: 'brain',  name: 'Brain',  sprite: 'dexter', machine: 'Desktop',     roles: ['Archivist', 'Planner'] },
      { agentId: 'forge',  name: 'Forge',  sprite: 'nova',   machine: 'GPU3060',     roles: ['Builder', 'Critic'] },
      { agentId: 'cihan',  name: 'Cihan',  sprite: 'rio',    machine: 'Human',       roles: ['Architect', 'Director'] },
    ];

    // Current agent states — updated from MC API
    const agentStates = {};
    for (const a of MC_AGENTS) {
      agentStates[a.agentId] = { state: 'offline', task: null, energy: 0.5 };
    }
    // Bridge starts as working (it's the one that's online)
    agentStates.bridge = { state: 'working', task: 'Operational', energy: 0.8 };
    // Cihan is always idle (human, present)
    agentStates.cihan = { state: 'idle', task: null, energy: 1.0 };

    function getMockAgentData() {
      return MC_AGENTS.map(a => ({
        id: a.agentId,
        name: a.name,
        state: agentStates[a.agentId].state,
        task: agentStates[a.agentId].task,
        energy: agentStates[a.agentId].energy,
      }));
    }

    // Poll MC dashboard API for live agent/task data
    async function pollMCData() {
      try {
        const res = await fetch('/api/agents-status');
        if (res.ok) {
          const data = await res.json();
          for (const agent of data.agents || []) {
            if (agentStates[agent.id]) {
              agentStates[agent.id].state = agent.state || 'offline';
              agentStates[agent.id].task = agent.task || null;
              agentStates[agent.id].energy = agent.energy ?? 0.5;
            }
          }
        }
      } catch (e) {
        // Silent — MC API may not be available
      }
    }

    function buildSceneConfig(cols, rows, floor, tiles) {
      const safeFloor = floor || Array.from({ length: rows }, () => Array(cols).fill(''));
      const walkable = [];
      for (let r = 0; r < rows; r++) {
        walkable[r] = [];
        for (let c = 0; c < cols; c++) {
          walkable[r][c] = (safeFloor[r]?.[c] ?? '') !== '';
        }
      }
      const resolvedTiles = { ...(tiles || {}) };
      for (const [key, src] of Object.entries(resolvedTiles)) {
        if (/^(blob:|data:|https?:\/\/)/.test(src)) continue;
        const clean = src.startsWith('/') ? src.slice(1) : src;
        resolvedTiles[key] = `/miniverse/${basePath}/${clean}`;
      }
      return {
        name: 'main',
        tileWidth: 32,
        tileHeight: 32,
        layers: [safeFloor],
        walkable,
        locations: {},
        tiles: resolvedTiles,
      };
    }

    async function main() {
      const container = document.getElementById('miniverse-container');
      const tooltip = document.getElementById('tooltip');
      const statusBar = document.getElementById('status-bar');

      // Load world data
      const worldData = await fetch(`${basePath}/world.json`).then(r => r.json()).catch(() => null);

      const gridCols = worldData?.gridCols ?? 16;
      const gridRows = worldData?.gridRows ?? 12;
      const sceneConfig = buildSceneConfig(gridCols, gridRows, worldData?.floor, worldData?.tiles);
      const tileSize = 32;

      // Build citizen configs from MC_AGENTS
      const workAnchors = (worldData?.props ?? [])
        .flatMap(f => (f.anchors ?? []).filter(a => a.type === 'work').map(a => a.name));

      // Prefix to fix absolute asset paths — served under /miniverse/
      const ASSET_PREFIX = '/miniverse';

      function mcSpriteConfig(spriteName) {
        return {
          sheets: {
            walk: `${ASSET_PREFIX}/universal_assets/citizens/${spriteName}_walk.png`,
            actions: `${ASSET_PREFIX}/universal_assets/citizens/${spriteName}_actions.png`,
          },
          animations: {
            idle_down: { sheet: 'actions', row: 3, frames: 4, speed: 0.5 },
            idle_up: { sheet: 'actions', row: 3, frames: 4, speed: 0.5 },
            walk_down: { sheet: 'walk', row: 0, frames: 4, speed: 0.15 },
            walk_up: { sheet: 'walk', row: 1, frames: 4, speed: 0.15 },
            walk_left: { sheet: 'walk', row: 2, frames: 4, speed: 0.15 },
            walk_right: { sheet: 'walk', row: 3, frames: 4, speed: 0.15 },
            working: { sheet: 'actions', row: 0, frames: 4, speed: 0.3 },
            sleeping: { sheet: 'actions', row: 1, frames: 2, speed: 0.8 },
            talking: { sheet: 'actions', row: 2, frames: 4, speed: 0.15 },
          },
          frameWidth: 64,
          frameHeight: 64,
        };
      }

      const spriteSheets = {};
      const citizens = [];
      for (let i = 0; i < MC_AGENTS.length; i++) {
        const a = MC_AGENTS[i];
        spriteSheets[a.sprite] = mcSpriteConfig(a.sprite);
        citizens.push({
          agentId: a.agentId,
          name: a.name,
          sprite: a.sprite,
          position: workAnchors[i] || worldData?.wanderPoints?.[i]?.name || `wander_${i}`,
        });
      }

      const mv = new MV.Miniverse({
        container,
        world: WORLD_ID,
        scene: 'main',
        signal: {
          type: 'mock',
          mockData: getMockAgentData,
          interval: 3000,
        },
        citizens,
        scale: 2,
        width: gridCols * tileSize,
        height: gridRows * tileSize,
        worldBasePath: `/miniverse/${basePath}`,
        sceneConfig,
        spriteSheets,
        objects: [],
        autoSpawn: false,
      });

      // Props system
      const props = new MV.PropSystem(tileSize, 2);
      const propImages = worldData?.propImages ?? {};
      await Promise.all(
        Object.entries(propImages).map(([id, src]) => {
          const clean = src.startsWith('/') ? src.slice(1) : src;
          return props.loadSprite(id, `/miniverse/${basePath}/${clean}`);
        }),
      );
      props.setLayout(worldData?.props ?? []);
      if (worldData?.wanderPoints) {
        props.setWanderPoints(worldData.wanderPoints);
      }
      props.setDeadspaceCheck((col, row) => {
        const floor = mv.getFloorLayer();
        return floor?.[row]?.[col] === '';
      });
      const syncProps = () => {
        mv.setTypedLocations(props.getLocations());
        mv.updateWalkability(props.getBlockedTiles());
      };
      syncProps();
      props.onSave(syncProps);

      await mv.start();

      mv.addLayer({ order: 5, render: (ctx) => props.renderBelow(ctx) });
      mv.addLayer({ order: 15, render: (ctx) => props.renderAbove(ctx) });

      // Tooltip
      mv.on('citizen:click', (data) => {
        const d = data;
        const agent = MC_AGENTS.find(a => a.agentId === d.agentId);
        tooltip.style.display = 'block';
        tooltip.querySelector('.name').textContent = `${d.name}${agent ? ' — ' + agent.machine : ''}`;
        tooltip.querySelector('.state').textContent = `State: ${d.state}`;
        tooltip.querySelector('.task').textContent = d.task ? `Task: ${d.task}` : agent ? `Roles: ${agent.roles.join(', ')}` : 'No active task';
        setTimeout(() => { tooltip.style.display = 'none'; }, 4000);
      });

      container.addEventListener('mousemove', (e) => {
        tooltip.style.left = e.clientX + 12 + 'px';
        tooltip.style.top = e.clientY + 12 + 'px';
      });

      // Status bar
      function updateStatusBar() {
        statusBar.innerHTML = MC_AGENTS.map(a => {
          const s = agentStates[a.agentId];
          return `<div class="agent"><span class="status-dot ${s.state}"></span>${a.name}: ${s.state}${s.task ? ' · ' + s.task : ''}</div>`;
        }).join('');
      }
      updateStatusBar();
      setInterval(updateStatusBar, 2000);

      // Poll MC data every 5 seconds
      pollMCData();
      setInterval(pollMCData, 5000);
    }

    main().catch(console.error);
  </script>
</body>
</html>
